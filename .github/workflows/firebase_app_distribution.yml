name: Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: "Android versionCode"
        required: true
      versionName:
        description: "Android versionName"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks
      - name: Grant execute permission
        run: chmod +x ./gradlew
      - name: Fetch string.h from private Maven
        run: |
          curl --fail --silent --show-error \
            -u "${{ secrets.PRIVATE_MAVEN_USER }}:${{ secrets.PRIVATE_MAVEN_PASSWORD }}" \
            -o app/src/main/cpp/secret/string.h \
            "https://maven.fpregistry.io/private-releases/com/fingerprintjs/demo-native-secrets/1.0.0/string.h"
      - name: Validate private Maven credentials
        run: |
          if [ -z "$ORG_GRADLE_PROJECT_privateMavenUser" ] || [ -z "$ORG_GRADLE_PROJECT_privateMavenPassword" ]; then
            echo "::error::GitHub secrets PRIVATE_MAVEN_USER and PRIVATE_MAVEN_PASSWORD must be configured."
            exit 1
          fi
      - name: Build release APK
        run: |
          ./gradlew clean :app:assembleRelease \
            -PVERSION_CODE=${{ github.event.inputs.versionCode }} \
            -PVERSION_NAME=${{ github.event.inputs.versionName }}
        env:
          ORG_GRADLE_PROJECT_privateMavenUser: ${{ secrets.PRIVATE_MAVEN_USER }}
          ORG_GRADLE_PROJECT_privateMavenPassword: ${{ secrets.PRIVATE_MAVEN_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_SIGN_KEY_ALIAS: ${{ secrets.RELEASE_SIGN_KEY_ALIAS }}
          RELEASE_SIGN_KEY_PASSWORD: ${{ secrets.RELEASE_SIGN_KEY_PASSWORD }}
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk