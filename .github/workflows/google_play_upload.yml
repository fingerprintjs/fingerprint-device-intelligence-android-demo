name: Google Play Release (Bundle Upload)

on:
  workflow_dispatch:
    inputs:
      versionCode:
        description: "Android versionCode"
        required: true
      versionName:
        description: "Android versionName"
        required: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    # Gradle reads ORG_GRADLE_PROJECT_* as project properties (privateMavenUser / privateMavenPassword).
    env:
      ORG_GRADLE_PROJECT_privateMavenUser: ${{ secrets.PRIVATE_MAVEN_USER }}
      ORG_GRADLE_PROJECT_privateMavenPassword: ${{ secrets.PRIVATE_MAVEN_PASSWORD }}

    steps:
      # -----------------------------
      # Checkout selected branch
      # -----------------------------
      - name: Checkout branch
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Java
      # -----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # -----------------------------
      # Decode signing keystore
      # -----------------------------
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Fetch string.h from private Maven
        run: |
          curl --fail --silent --show-error \
            -u "${{ secrets.PRIVATE_MAVEN_USER }}:${{ secrets.PRIVATE_MAVEN_PASSWORD }}" \
            -o app/src/main/cpp/secret/string.h \
            "https://maven.fpregistry.io/private-releases/com/fingerprintjs/demo-native-secrets/1.0.0/string.h"

      - name: Validate private Maven credentials
        run: |
          if [ -z "$ORG_GRADLE_PROJECT_privateMavenUser" ] || [ -z "$ORG_GRADLE_PROJECT_privateMavenPassword" ]; then
            echo "::error::GitHub secrets PRIVATE_MAVEN_USER and PRIVATE_MAVEN_PASSWORD must be configured."
            exit 1
          fi

      # -----------------------------
      # Build signed AAB (SDK from private Maven: maven.fpregistry.io/private-releases)
      # -----------------------------
      - name: Build Release AAB
        run: |
          ./gradlew bundleRelease \
            -PVERSION_CODE=${{ github.event.inputs.versionCode }} \
            -PVERSION_NAME=${{ github.event.inputs.versionName }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_SIGN_KEY_ALIAS: ${{ secrets.RELEASE_SIGN_KEY_ALIAS }}
          RELEASE_SIGN_KEY_PASSWORD: ${{ secrets.RELEASE_SIGN_KEY_PASSWORD }}

      # -----------------------------
      # Upload to Google Play
      # -----------------------------
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.fingerprintjs.android.fpjs_pro_demo
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
